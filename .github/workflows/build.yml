name: Build CoreSettings Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7 # Updated to v7 for Node 24 support

    - name: Set up JDK 17
      uses: actions/setup-java@v5 # Updated to v5 for Node 24 support
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B clean package --file pom.xml

    - name: Upload Artifact
      uses: actions/upload-artifact@v7 # Updated to v7 for Node 24 support
      with:
        name: CoreSettings-Build
        path: target/*.jar
        if-no-files-found: error
