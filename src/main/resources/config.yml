# CoreSettings Configuration
gui:
  title: "&6&lCORE SETTINGS"
  size: 54
  border-material: GRAY_STAINED_GLASS_PANE
  close:
    slot: 49
    material: BARRIER
    name: "&c&lCLOSE"
    lore:
      - "&7Click to close the menu"

# Toggle Options - Define all settings here
options:
  toggle_public_chat:
    section: CHAT
    slot: 10
    material: PAPER
    default: true
    enabled:
      name: "&aPublic Chat"
      lore:
        - "&7Status: &aEnabled"
        - "&7Click to disable"
    disabled:
      name: "&cPublic Chat"
      lore:
        - "&7Status: &cDisabled"
        - "&7Click to enable"
  toggle_private_msg:
    section: CHAT
    slot: 11
